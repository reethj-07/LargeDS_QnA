services:
  - type: web
    name: bigdata-qna
    runtime: docker
    plan: starter
    healthCheckPath: /
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: USE_CROSS_ENCODER
        value: "0"
      - key: PORT
        value: "7860"
      - key: DUCKDB_READ_ONLY
        value: "true"
      - key: USE_SHARED_HYBRID
        value: "true"
      - key: LOG_QUERY_PREVIEWS
        value: "false"
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 5
